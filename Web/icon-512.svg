<rect transform="rotate(202.5)" x="-5" y="-150" width="10" height="68" rx="5" fill="#B8765E" opacity="0.8"/>
<rect transform="rotate(247.5)" x="-5" y="-150" width="10" height="68" rx="5" fill="#B8765E" opacity="0.8"/>
<rect transform="rotate(292.5)" x="-5" y="-150" width="10" height="68" rx="5" fill="#B8765E" opacity="0.8"/>
